<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS Portal | Umut</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:    #050d1f;
            --navy-2:  #080f22;
            --navy-3:  #0d1730;
            --navy-4:  #111e3a;
            --blue:    #1a3a6e;
            --accent:  #2d6be4;
            --glow:    #3b82f6;
            --electric:#60a5fa;
            --cyan:    #38bdf8;
            --white:   #f0f4ff;
            --muted:   #4a6190;
            --border:  rgba(45,107,228,0.18);
            --border-h:rgba(96,165,250,0.4);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Ambient background ── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
        }
        .orb-1 { width: 600px; height: 600px; background: #1d4ed8; top: -200px; left: -150px; }
        .orb-2 { width: 500px; height: 500px; background: #0e7490; bottom: -150px; right: -100px; opacity: 0.13; }
        .orb-3 { width: 300px; height: 300px; background: #3b82f6; top: 40%; left: 55%; opacity: 0.10; }

        /* Dot grid */
        .bg-dots {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(96,165,250,0.12) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        }

        /* ── Layout ── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 0 auto;
            padding: 0 32px 100px;
        }

        /* ── Header ── */
        header {
            padding: 72px 0 60px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 56px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
        }

        .header-left {}

        .eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--electric);
            margin-bottom: 18px;
            opacity: 0.7;
        }

        h1 {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--white);
        }

        h1 .accent-word {
            color: var(--electric);
            position: relative;
        }

        h1 .accent-word::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--glow), transparent);
            border-radius: 2px;
        }

        .header-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .badge-chip {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 99px;
            border: 1px solid var(--border-h);
            color: var(--electric);
            background: rgba(59,130,246,0.07);
        }

        .badge-count {
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Grid ── */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 640px) {
            .courses-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            header { flex-direction: column; align-items: flex-start; }
            .header-badge { align-items: flex-start; }
        }

        /* ── Card ── */
        .card {
            position: relative;
            display: block;
            text-decoration: none;
            background: var(--navy-3);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 24px 24px;
            overflow: hidden;
            transition: border-color 0.25s, background 0.25s, transform 0.25s;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 65%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            border-color: var(--border-h);
            background: var(--navy-4);
            transform: translateY(-4px);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Top-right glow dot */
        .card::after {
            content: '';
            position: absolute;
            top: 18px; right: 18px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--glow);
            opacity: 0;
            box-shadow: 0 0 8px 2px var(--glow);
            transition: opacity 0.25s;
        }

        .card:hover::after {
            opacity: 0.7;
        }

        .card-icon-wrap {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: rgba(29, 78, 216, 0.15);
            border: 1px solid rgba(59,130,246,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            transition: background 0.25s, border-color 0.25s;
        }

        .card:hover .card-icon-wrap {
            background: rgba(59,130,246,0.2);
            border-color: rgba(96,165,250,0.4);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8baad4;
            line-height: 1.35;
            position: relative;
            z-index: 1;
            transition: color 0.2s;
            letter-spacing: -0.01em;
        }

        .card:hover .card-title {
            color: #c8deff;
        }

        .card-arrow {
            position: absolute;
            bottom: 20px; right: 20px;
            font-size: 13px;
            color: var(--muted);
            z-index: 1;
            opacity: 0;
            transform: translate(-3px, 3px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translate(0, 0);
        }

        /* ── Footer ── */
        footer {
            margin-top: 60px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-size: 11px;
            color: var(--muted);
            opacity: 0.6;
        }

        .footer-line {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            opacity: 0.4;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        header { animation: fadeUp 0.5s cubic-bezier(.23,1,.32,1) both; }

        .card { animation: fadeUp 0.5s cubic-bezier(.23,1,.32,1) both; }
        .card:nth-child(1) { animation-delay: 0.08s; }
        .card:nth-child(2) { animation-delay: 0.12s; }
        .card:nth-child(3) { animation-delay: 0.16s; }
        .card:nth-child(4) { animation-delay: 0.20s; }
        .card:nth-child(5) { animation-delay: 0.24s; }
        .card:nth-child(6) { animation-delay: 0.28s; }
        .card:nth-child(7) { animation-delay: 0.32s; }
        .card:nth-child(8) { animation-delay: 0.36s; }
        .card:nth-child(9) { animation-delay: 0.40s; }

        footer { animation: fadeUp 0.5s 0.45s cubic-bezier(.23,1,.32,1) both; }
    </style>
</head>
