<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS Portal | Umut</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #080809;
            color: #e8e8ec;
            min-height: 100vh;
            padding: 64px 40px 80px;
        }

        .page {
            max-width: 960px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 72px;
            animation: fadeUp .5s cubic-bezier(.23,1,.32,1) both;
        }

        .site-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #3a3a48;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(48px, 7vw, 82px);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 0.95;
            color: #f0f0f4;
        }

        h1 .dim { color: #252530; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            animation: fadeUp .55s .08s cubic-bezier(.23,1,.32,1) both;
        }

        @media (max-width: 680px) {
            .grid { grid-template-columns: 1fr 1fr; }
            body { padding: 40px 20px 60px; }
        }

        .card {
            position: relative;
            display: block;
            text-decoration: none;
            background: #0f0f12;
            padding: 32px 28px 28px;
            transition: background 0.18s;
            overflow: hidden;
        }

        .card:hover { background: #16161c; }
        .card:hover .card-name { color: #ffffff; }
        .card:hover .card-arrow { opacity: 1; transform: translate(0,0); }

        .card-featured {
            grid-column: span 2;
            padding: 48px 40px 40px;
        }

        .card-icon {
            font-size: 28px;
            display: block;
            margin-bottom: 28px;
            line-height: 1;
        }

        .card-featured .card-icon {
            font-size: 38px;
            margin-bottom: 36px;
        }

        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #9090a8;
            line-height: 1.3;
            letter-spacing: -0.01em;
            transition: color 0.18s;
        }

        .card-featured .card-name { font-size: 22px; }

        .card-arrow {
            position: absolute;
            bottom: 24px;
            right: 22px;
            font-size: 16px;
            color: #30303c;
            opacity: 0;
            transform: translate(-4px, 4px);
            transition: opacity 0.18s, transform 0.18s;
        }

        footer {
            margin-top: 36px;
            font-size: 11px;
            color: #242430;
            letter-spacing: 0.06em;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <p class="site-label">MIS · Akademik Arşiv</p>
        <h1>Ders<br><span class="dim">Portalı.</span></h1>
    </header>

    <div class="grid">

        <a href="nesneTaban.html" class="card card-featured">
            <span class="card-icon">📦</span>
            <div class="card-name">Nesne Tabanlı Programlama</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="veriTabani.html" class="card">
            <span class="card-icon">🗄️</span>
            <div class="card-name">Veri Tabanı Yön. Sis.</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="finans.html" class="card">
            <span class="card-icon">📈</span>
            <div class="card-name">Finansal Yönetim</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="dataMining.html" class="card">
            <span class="card-icon">💎</span>
            <div class="card-name">Veri Madenciliği</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="bilisimHukuk.html" class="card">
            <span class="card-icon">🏛️</span>
            <div class="card-name">Bilişim Hukuku</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="webDesign.html" class="card">
            <span class="card-icon">🌐</span>
            <div class="card-name">Web Tasarım &amp; İnt. Prog.</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="isEtigi.html" class="card">
            <span class="card-icon">⚖️</span>
            <div class="card-name">İş Etiği</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="organization.html" class="card">
            <span class="card-icon">👤</span>
            <div class="card-name">Örgütsel Davranış</div>
            <span class="card-arrow">↗</span>
        </a>

        <a href="pazarlama.html" class="card">
            <span class="card-icon">🎯</span>
            <div class="card-name">Dijital Pazarlama</div>
            <span class="card-arrow">↗</span>
        </a>

    </div>

    <footer>© 2026 Umut</footer>

</div>
</body>
</html>
